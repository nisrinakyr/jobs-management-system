# ==============================================================
# CD Pipeline — Jobs Management System
# Kelompok 13 · PSO B
#
# Berjalan HANYA JIKA: CI Pipeline sukses pada branch main
# Menggunakan Publish Profile (XML) untuk autentikasi Azure
# Migrasi database dijalankan via Kudu REST API
# ==============================================================

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # harus persis sama dengan `name` di ci.yml
    types:
      - completed
    branches:
      - main

jobs:

  # ------------------------------------------------------------
  # JOB 1: BUILD
  # Hanya jalan kalau CI conclusion benar-benar 'success'
  # ------------------------------------------------------------
  build:
    name: "📦 Build Artifact"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout kode (commit yang sama dengan CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, xml, curl, zip, bcmath

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-prod-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-prod-composer-

      - name: Install PHP dependencies (production, tanpa dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets (Vite + Tailwind)
        run: npm run build

      - name: Package aplikasi menjadi ZIP
        run: |
          zip -r deployment.zip . \
            --exclude "*.git*" \
            --exclude "*node_modules*" \
            --exclude "*tests*" \
            --exclude "*.env*" \
            --exclude "*/.github/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-app-${{ github.sha }}
          path: deployment.zip
          retention-days: 7

  # ------------------------------------------------------------
  # JOB 2: DEPLOY
  # ------------------------------------------------------------
  deploy:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://jobs-kelompok13-adeudzgqhjddhmb5.southeastasia-01.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-app-${{ github.sha }}

      - name: Deploy ke Azure App Service (Zip Deploy)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'jobs-kelompok13'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deployment.zip

      - name: Jalankan migrasi database via Kudu API
        run: |
          echo "Menjalankan php artisan migrate via Kudu REST API..."
          curl -X POST \
            "https://jobs-kelompok13-adeudzgqhjddhmb5.scm.southeastasia-01.azurewebsites.net/api/command" \
            -u '${{ secrets.AZURE_KUDU_CREDENTIALS }}' \
            -H "Content-Type: application/json" \
            -d '{"command":"php artisan migrate --force","dir":"site\\wwwroot"}' \
            --fail \
            && echo "✅ Migrasi berhasil." \
            || (echo "❌ Migrasi gagal!" && exit 1)

      - name: Jalankan optimasi Laravel via Kudu API
        run: |
          echo "Menjalankan php artisan optimize..."
          curl -X POST \
            "https://jobs-kelompok13-adeudzgqhjddhmb5.scm.southeastasia-01.azurewebsites.net/api/command" \
            -u '${{ secrets.AZURE_KUDU_CREDENTIALS }}' \
            -H "Content-Type: application/json" \
            -d '{"command":"php artisan optimize","dir":"site\\wwwroot"}' \
            --fail \
            && echo "✅ Optimasi berhasil." \
            || echo "⚠️ Optimasi gagal, lanjut."

      - name: Health check
        run: |
          echo "Menunggu App Service menyerap deployment baru..."
          sleep 60
          curl --fail --retry 5 --retry-delay 15 \
            https://jobs-kelompok13-adeudzgqhjddhmb5.southeastasia-01.azurewebsites.net/up\
            && echo "✅ Deployment berhasil, aplikasi berjalan normal." \
            || (echo "❌ Health check gagal!" && exit 1)
